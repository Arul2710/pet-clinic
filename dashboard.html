<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Pet Vaccination & Microchipping Clinic</title>
  <meta name="description" content="Manage your pet's health records, appointments, vaccination schedules, and microchip information.">
  <link rel="canonical" href="https://petclinic.com/dashboard">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="assets/css/google-fonts.css">
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],display:['Plus Jakarta Sans','sans-serif']}}}}</script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-sans">
  <div id="navbar"></div>

  <!-- Dashboard -->
  <div class="min-h-screen pt-20 pb-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

      <!-- Welcome Banner -->
      <div class="relative overflow-hidden rounded-2xl bg-gradient-to-r from-blue-600 via-blue-500 to-teal-400 p-6 sm:p-10 mb-8" data-aos="fade-down">
        <div class="absolute inset-0 bg-grid opacity-10"></div>
        <div class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/2 blur-3xl"></div>
        <div class="relative">
          <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <div>
              <h1 class="text-2xl sm:text-3xl font-bold text-white mb-2" id="welcomeMessage">Welcome back, Pet Parent!</h1>
              <p class="text-blue-50/90 text-sm sm:text-base">Here's your pet's health overview. Stay up-to-date with vaccinations and appointments.</p>
            </div>
            <a href="contact.html" class="inline-flex items-center px-5 py-2.5 bg-white text-blue-600 font-semibold rounded-xl shadow-lg hover:-translate-y-0.5 transition-all duration-300 text-sm whitespace-nowrap">
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              Book Appointment
            </a>
          </div>
        </div>
      </div>

      <div class="grid lg:grid-cols-3 gap-8">
        <!-- Main Content -->
        <div class="lg:col-span-2 space-y-8">

          <!-- My Pets -->
          <section id="pets" data-aos="fade-up">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                My Pets
              </h2>
              <button class="text-sm text-blue-600 dark:text-blue-400 hover:underline font-medium">+ Add Pet</button>
            </div>
            <div class="grid sm:grid-cols-2 gap-4" id="petsContainer">
              <!-- Pet cards injected by JS -->
            </div>
          </section>

          <!-- Vaccination Records -->
          <section id="vaccinations" data-aos="fade-up">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
                <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                Vaccination Records
              </h2>
            </div>
            <div class="glass-card rounded-xl overflow-hidden">
              <div class="overflow-x-auto">
                <table class="w-full text-sm">
                  <thead>
                    <tr class="bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400">
                      <th class="text-left px-4 py-3 font-medium">Vaccine</th>
                      <th class="text-left px-4 py-3 font-medium">Date Given</th>
                      <th class="text-left px-4 py-3 font-medium">Next Due</th>
                      <th class="text-left px-4 py-3 font-medium">Status</th>
                    </tr>
                  </thead>
                  <tbody id="vaccinationTableBody" class="divide-y divide-gray-100 dark:divide-gray-800">
                    <!-- Injected by JS -->
                  </tbody>
                </table>
              </div>
            </div>
          </section>

          <!-- Health Reports -->
          <section id="health" data-aos="fade-up">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-bold text-gray-900 dark:text-white flex items-center gap-2">
                <svg class="w-6 h-6 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Health Reports
              </h2>
            </div>
            <div class="grid sm:grid-cols-2 gap-4" id="healthReportsContainer">
              <!-- Injected by JS -->
            </div>
          </section>
        </div>

        <!-- Sidebar -->
        <div class="space-y-6">

          <!-- Upcoming Appointments -->
          <section id="appointments" class="glass-card rounded-xl p-5" data-aos="fade-left">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
              <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              Upcoming Appointments
            </h3>
            <div id="appointmentsContainer" class="space-y-3">
              <!-- Injected by JS -->
            </div>
          </section>

          <!-- Microchip Records -->
          <section id="microchip" class="glass-card rounded-xl p-5" data-aos="fade-left" data-aos-delay="100">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
              <svg class="w-5 h-5 text-teal-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
              Microchip Records
            </h3>
            <div id="microchipContainer">
              <!-- Injected by JS -->
            </div>
          </section>

          <!-- Quick Profile -->
          <section id="profile" class="glass-card rounded-xl p-5" data-aos="fade-left" data-aos-delay="200">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4 flex items-center gap-2">
              <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              Profile
            </h3>
            <div id="profileContainer" class="text-sm space-y-3">
              <!-- Injected by JS -->
            </div>
          </section>

        </div>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init();</script>
  <script src="js/darkmode.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
